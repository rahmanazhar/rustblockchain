apiVersion: v1
kind: Secret
metadata:
  name: rustchain-secrets
  namespace: rustchain
type: Opaque
stringData:
  # IMPORTANT: Change these values in production!
  # Use a secrets manager (Vault, AWS Secrets Manager, etc.) instead.
  jwt-secret: "change-me-to-a-secure-random-string-in-production"
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchain-validator-key
  namespace: rustchain
type: Opaque
# Validator key should be generated with `rustchain keygen`
# and populated via a secrets manager in production.
# Example:
# data:
#   validator.key: <base64-encoded-keyfile>
